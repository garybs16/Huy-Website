name: Validate Full Stack Site

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "validate-site"
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
      - name: Confirm checked-out dependency graph
        run: |
          git rev-parse HEAD
          node -e "const pkg=require('./package.json'); const lock=require('./package-lock.json'); console.log('verify=', pkg.scripts.verify); console.log('concurrently=', pkg.devDependencies.concurrently); console.log('locked concurrently=', lock.packages['node_modules/concurrently']?.version); console.log('locked shell-quote=', lock.packages['node_modules/shell-quote']?.version);"
      - name: Install dependencies
        run: npm install
      - name: Verify production readiness gates
        run: npm run verify

  deploy:
    name: Deploy to AWS Lightsail
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name != 'pull_request'
    environment: production
    concurrency:
      group: "deploy-production"
      cancel-in-progress: true
    steps:
      - name: Install SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.LIGHTSAIL_SSH_KEY }}" > ~/.ssh/lightsail_deploy_key
          chmod 600 ~/.ssh/lightsail_deploy_key
          ssh-keyscan -H "${{ secrets.LIGHTSAIL_HOST }}" >> ~/.ssh/known_hosts

      - name: Pull latest code, build, and restart app
        shell: bash
        run: |
          ssh -i ~/.ssh/lightsail_deploy_key \
            -o IdentitiesOnly=yes \
            "${{ secrets.LIGHTSAIL_USER }}@${{ secrets.LIGHTSAIL_HOST }}" \
            'set -euo pipefail
             cd /var/www/html
             git fetch origin main
             git reset --hard origin/main
             npm install
             npm run build
             sudo pm2 restart nodeapp --update-env
             sudo pm2 save
             curl -fsS http://127.0.0.1/api/health'
