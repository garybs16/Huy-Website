name: Validate Full Stack Site

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "validate-site"
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Setup Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "24"
      - name: Confirm checked-out dependency graph
        run: |
          git rev-parse HEAD
          node -e "const pkg=require('./package.json'); const lock=require('./package-lock.json'); console.log('verify=', pkg.scripts.verify); console.log('concurrently=', pkg.devDependencies.concurrently); console.log('locked concurrently=', lock.packages['node_modules/concurrently']?.version); console.log('locked shell-quote=', lock.packages['node_modules/shell-quote']?.version);"
      - name: Install locked dependencies
        run: npm ci
      - name: Verify production readiness gates
        run: npm run verify

  deploy:
    name: Deploy to AWS Lightsail
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name != 'pull_request'
    environment: production
    env:
      LIGHTSAIL_SSH_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
      LIGHTSAIL_HOST: ${{ secrets.LIGHTSAIL_HOST }}
      LIGHTSAIL_USER: ${{ secrets.LIGHTSAIL_USER }}
    concurrency:
      group: "deploy-production"
      cancel-in-progress: true
    steps:
      - name: Check deployment secrets
        id: deploy-secrets
        shell: bash
        run: |
          missing=()
          [[ -n "${LIGHTSAIL_SSH_KEY}" ]] || missing+=("LIGHTSAIL_SSH_KEY")
          [[ -n "${LIGHTSAIL_HOST}" ]] || missing+=("LIGHTSAIL_HOST")
          [[ -n "${LIGHTSAIL_USER}" ]] || missing+=("LIGHTSAIL_USER")

          if (( ${#missing[@]} )); then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            printf '::notice::Skipping production deploy because these secrets are not configured: %s\n' "${missing[*]}"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install SSH key
        if: steps.deploy-secrets.outputs.configured == 'true'
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${LIGHTSAIL_SSH_KEY}" > ~/.ssh/lightsail_deploy_key
          chmod 600 ~/.ssh/lightsail_deploy_key
          ssh-keyscan -H "${LIGHTSAIL_HOST}" >> ~/.ssh/known_hosts

      - name: Pull latest code, build, and restart app
        if: steps.deploy-secrets.outputs.configured == 'true'
        shell: bash
        run: |
          ssh -i ~/.ssh/lightsail_deploy_key \
            -o IdentitiesOnly=yes \
            "${LIGHTSAIL_USER}@${LIGHTSAIL_HOST}" \
            'set -euo pipefail
             cd /var/www/html
             git fetch origin main
             git reset --hard origin/main
             npm ci
             npm run build
             sudo install -m 0644 deploy/firststep.service /etc/systemd/system/firststep.service
             sudo install -m 0644 deploy/nginx-security.conf /etc/nginx/conf.d/firststep-security.conf
             sudo chown -R admin:admin /var/data
             sudo chmod 0700 /var/data
             sudo nginx -t
             sudo systemctl daemon-reload
             sudo systemctl reload nginx
             sudo systemctl restart firststep
             sudo systemctl status firststep --no-pager -l'

      - name: Verify production health
        if: steps.deploy-secrets.outputs.configured == 'true'
        shell: bash
        run: |
          for attempt in {1..30}; do
            if curl -fsS https://firststepha.com/api/health; then
              exit 0
            fi
            sleep 2
          done
          exit 1
