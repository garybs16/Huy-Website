services:
  - type: web
    name: first-step-healthcare-academy
    runtime: node
    plan: starter
    healthCheckPath: /api/health
    buildCommand: npm ci && npm run build
    startCommand: npm run start
    autoDeploy: true
    disk:
      name: app-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: SERVE_STATIC_APP
        value: "true"
      - key: TRUST_PROXY
        value: "true"
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SESSION_SECRET
        generateValue: true
      - key: ADMIN_SESSION_COOKIE_SAME_SITE
        value: "lax"
      - key: DATA_DIR
        value: /var/data
      - key: DATABASE_URL
        value: /var/data/enrollment.db
      - key: API_ADMIN_KEY
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: PUBLIC_APP_URL
        sync: false
